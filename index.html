<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Guia PA — Referência Rápida</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1a1a1a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Guia PA">
  <link rel="apple-touch-icon" href="icon.svg">
  <link rel="stylesheet" href="css/app.css">
</head>
<body>

<div id="header">
  <h1>💉 Guia PA — Referência Rápida</h1>
  <button id="themeBtn" title="Alternar tema">🌙</button>
</div>

<div id="tabs">
  <button class="tab on" data-tab="ev">💉 EV</button>
  <button class="tab"    data-tab="vo">💊 VO</button>
  <button class="tab"    data-tab="proto">📋 Protocolos</button>
</div>

<div id="bar">
  <div style="display:flex;gap:6px">
    <input type="text"   id="search" placeholder="Buscar medicamento, indicação, macete..." autocomplete="off" style="flex:1;min-width:0">
    <input type="number" id="wt"     placeholder="Peso (kg)" min="1" max="300">
  </div>
  <div id="filters"></div>
  <div id="count"></div>
</div>

<div id="grid"></div>
<div id="protocols" style="display:none"></div>

<footer>· Uso exclusivo como referência clínica</footer>

<script type="module" src="js/app.js"></script>
</body>
</html>
