<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Guia EV — PA Referência Rápida</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1a1a1a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Guia EV">

<style>
:root{
  --bg:#f5f5f0;--cardbg:#fff;--border:#e0e0d8;--text:#1a1a1a;--muted:#888;
  --mac-bg:#f5f5f0;--mac-text:#555;--filt-bg:#fff;--filt-border:#ccc;--filt-text:#555;
  --inp-bg:#fff;--inp-border:#ccc;--footer:#aaa;--filt-hover:#eee;
  --wdose-bg:#f0faf4;--wdose-text:#1a6a35;--cp-hover:#f0f0f0;
  --sol-sf-bg:#dce8ff;--sol-sf-t:#1a3a7a;--sol-sg-bg:#fff3cc;--sol-sg-t:#6b4a00;
  --pump-bg:#f0f4ff;--pump-border:#5577cc;--pump-lbl:#1a3a7a;--pump-res:#0a2a6a;
}
[data-theme=dark]{
  --bg:#181818;--cardbg:#242424;--border:#383838;--text:#e0e0e0;--muted:#777;
  --mac-bg:#1e1e1e;--mac-text:#999;--filt-bg:#2a2a2a;--filt-border:#444;--filt-text:#aaa;
  --inp-bg:#242424;--inp-border:#444;--footer:#555;--filt-hover:#333;
  --wdose-bg:#1a2e22;--wdose-text:#4caf7d;--cp-hover:#333;
  --sol-sf-bg:#1a2e4a;--sol-sf-t:#7ab0ff;--sol-sg-bg:#2e2800;--sol-sg-t:#ffd066;
  --pump-bg:#151c2e;--pump-border:#4466aa;--pump-lbl:#7ab0ff;--pump-res:#9fc5ff;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);padding:1rem;transition:background .2s,color .2s}
#header{display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem}
h1{font-size:18px;font-weight:500;color:var(--text)}
#themeBtn{background:none;border:1px solid var(--filt-border);border-radius:8px;cursor:pointer;font-size:15px;padding:5px 9px;color:var(--text);line-height:1}
#bar{position:sticky;top:0;background:var(--bg);padding:8px 0 6px;z-index:10}
#search,#wt{padding:9px 13px;font-size:14px;border:1px solid var(--inp-border);border-radius:8px;background:var(--inp-bg);color:var(--text);outline:none}
#search:focus,#wt:focus{border-color:#888}
#wt{width:90px;padding:9px 10px}
#filters{display:flex;gap:5px;flex-wrap:wrap;padding:8px 0 4px}
.filt{padding:3px 10px;font-size:12px;border:1px solid var(--filt-border);border-radius:20px;background:var(--filt-bg);color:var(--filt-text);cursor:pointer}
.filt:hover{background:var(--filt-hover)}
.filt.on{background:var(--text);color:var(--bg);border-color:var(--text)}
#count{font-size:12px;color:var(--muted);padding:2px 0 8px}
#grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:8px}
.card{background:var(--cardbg);border:1px solid var(--border);border-left:3px solid var(--cc);border-radius:10px;padding:11px 13px}
.ch{display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:8px}
.dn{font-size:14px;font-weight:500;color:var(--text);line-height:1.3}
.cb{font-size:11px;padding:2px 7px;border-radius:20px;background:var(--cbg);color:var(--ct);white-space:nowrap;flex-shrink:0;margin-top:1px}
.row{display:flex;gap:5px;margin-bottom:3px;font-size:12.5px}
.lbl{color:var(--muted);min-width:58px;flex-shrink:0;font-size:11.5px;padding-top:1px}
.val{color:var(--text);line-height:1.4}
.mac{background:var(--mac-bg);border-radius:6px;padding:6px 9px;font-size:12px;color:var(--mac-text);margin-top:7px;line-height:1.5}
.nores{text-align:center;color:var(--muted);padding:3rem 0;font-size:14px;grid-column:1/-1}
footer{text-align:center;font-size:11px;color:var(--footer);margin-top:2rem;padding-top:1rem;border-top:1px solid var(--border)}
.wdose{background:var(--wdose-bg);border-radius:6px;padding:6px 9px;font-size:12px;color:var(--wdose-text);margin-top:6px;line-height:1.6}
.wdl{font-weight:600}
.cp{cursor:pointer;font-size:13px;padding:1px 5px;border-radius:4px;opacity:0.45;transition:opacity .15s;flex-shrink:0;user-select:none}
.cp:hover{opacity:1;background:var(--cp-hover)}
.fav{cursor:pointer;font-size:13px;padding:1px 5px;border-radius:4px;opacity:0.35;transition:opacity .15s;flex-shrink:0;user-select:none}
.fav:hover,.fav.on{opacity:1}
.sol{display:inline-block;font-size:10px;font-weight:600;padding:1px 6px;border-radius:4px;margin-right:2px;letter-spacing:.2px}
.sol-sf{background:var(--sol-sf-bg);color:var(--sol-sf-t)}
.sol-sg{background:var(--sol-sg-bg);color:var(--sol-sg-t)}
.sol-d{background:var(--filt-hover);color:var(--muted)}
.pump{background:var(--pump-bg);border-left:2px solid var(--pump-border);border-radius:6px;padding:7px 9px;font-size:12px;margin-top:6px}
.pump-lbl{font-weight:700;color:var(--pump-lbl)}
.pump-dil{color:var(--muted);font-size:11px;margin-left:4px}
.pump-row{margin-top:5px;display:flex;align-items:center;gap:5px;flex-wrap:wrap;font-size:12px;color:var(--text)}
.pump-inp{width:64px;padding:3px 6px;font-size:12px;border:1px solid var(--inp-border);border-radius:5px;background:var(--inp-bg);color:var(--text);outline:none;text-align:center}
.pump-unit{color:var(--muted);font-size:11px}
.pump-res{font-size:13px;font-weight:700;color:var(--pump-res)}
#tabs{display:flex;gap:6px;margin-bottom:10px}
.tab{padding:5px 14px;font-size:13px;border:1px solid var(--filt-border);border-radius:8px;background:var(--filt-bg);color:var(--filt-text);cursor:pointer}
.tab.on{background:var(--text);color:var(--bg);border-color:var(--text)}
#protocols{display:none}
.pcard{background:var(--cardbg);border:1px solid var(--border);border-left:4px solid;border-radius:10px;padding:13px 15px;margin-bottom:10px}
.pcard-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:12px}
.pfase{margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--border)}
.pfase:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none}
.pfase-hd{font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;display:flex;align-items:center;gap:7px}
.pfase-tempo{background:var(--filt-hover);padding:1px 8px;border-radius:10px;font-size:10px;font-weight:500;color:var(--muted);text-transform:none;letter-spacing:0}
.pitem{padding:5px 0;border-bottom:1px dashed var(--border)}
.pitem:last-child{border-bottom:none;padding-bottom:0}
.pitem-top{display:flex;gap:8px;align-items:baseline;flex-wrap:wrap}
.pitem-drug{font-weight:600;font-size:13px;color:var(--text)}
.pitem-dose{font-size:12.5px;color:var(--text)}
.pitem-obs{font-size:11.5px;color:var(--muted);margin-top:2px}
.pou{text-align:center;font-size:11px;font-weight:700;color:var(--muted);padding:3px 0;letter-spacing:.5px}
</style>
</head>
<body>
<div id="header">
  <h1>💉 Guia EV — PA Referência Rápida</h1>
  <button id="themeBtn" onclick="toggleTheme()" title="Alternar tema">🌙</button>
</div>
<div id="tabs">
  <button class="tab on" data-tab="meds" onclick="setTab('meds')">💊 Medicamentos</button>
  <button class="tab" data-tab="proto" onclick="setTab('proto')">📋 Protocolos</button>
</div>
<div id="bar">
  <div style="display:flex;gap:6px">
    <input type="text" id="search" placeholder="Buscar medicamento, indicação, macete..." autocomplete="off" style="flex:1;min-width:0">
    <input type="number" id="wt" placeholder="Peso (kg)" min="1" max="300">
  </div>
  <div id="filters"></div>
  <div id="count"></div>
</div>
<div id="grid"></div>
<div id="protocols"></div>
<footer> · Uso exclusivo como referência clínica</footer>

};
const _pumpDoses={};

function _pumpCalc(p,dose,kg){
  if(!dose)return"—";
  const needsKg=p.unit.includes("/kg/");
  if(needsKg&&!kg)return"informe o peso ↑";
  let mlh;
  if(p.unit==="mcg/kg/min")mlh=(dose*kg*60)/p.conc;
  else if(p.unit==="UI/kg/h"||p.unit==="mg/kg/h")mlh=(dose*kg)/p.conc;
  else if(p.unit==="mcg/min")mlh=(dose*60)/p.conc;
  else mlh=dose/p.conc;
  return mlh.toFixed(1)+" mL/h";
}

function calcPump(el,i){
  const p=PUMP[_shown[i].n];
  if(!p)return;
  const dose=parseFloat(el.value)||0;
  _pumpDoses[_shown[i].n]=dose;
  const kg=parseFloat(document.getElementById("wt").value)||0;
  el.parentElement.querySelector(".pump-res").textContent=_pumpCalc(p,dose,kg);
}

let _favs=new Set(JSON.parse(localStorage.getItem('guia-favs')||'[]'));
function saveFavs(){localStorage.setItem('guia-favs',JSON.stringify([..._favs]));}
function toggleFav(i,el){
  const name=_shown[i].n;
  if(_favs.has(name)){_favs.delete(name);el.textContent='☆';el.classList.remove('on');}
  else{_favs.add(name);el.textContent='⭐';el.classList.add('on');}
  saveFavs();show(filt());
}

const allCats=["Todos","⭐",...Object.keys(C)];
let active="Todos";
let _shown=[];

function mkFilt(){
  const el=document.getElementById("filters");
  el.innerHTML=allCats.map(c=>`<button class="filt${c===active?" on":""}" data-c="${c}">${c}</button>`).join("");
  el.querySelectorAll(".filt").forEach(b=>b.addEventListener("click",()=>{active=b.dataset.c;mkFilt();show(filt())}));
}

function filt(){
  const q=document.getElementById("search").value.toLowerCase().trim();
  let list=M.filter(m=>{
    const mc=active==="Todos"||(active==="⭐"?_favs.has(m.n):m.cat===active);
    if(!q)return mc;
    return mc&&(m.n+m.cat+m.dose+m.ind+m.mac+m.dil+m.amp).toLowerCase().includes(q);
  });
  if(active==="Todos"||active==="⭐")
    list=list.slice().sort((a,b)=>(_favs.has(b.n)?1:0)-(_favs.has(a.n)?1:0));
  return list;
}

function show(list){
  _shown=list;
  const g=document.getElementById("grid");
  const kg=parseFloat(document.getElementById("wt").value)||0;
  document.getElementById("count").textContent=list.length+" medicamento"+(list.length!==1?"s":"")+" encontrado"+(list.length!==1?"s":"");
  if(!list.length){g.innerHTML='<div class="nores">Nenhum resultado encontrado.</div>';return;}
  g.innerHTML=list.map((m,i)=>{
    const cat=C[m.cat]||{c:"#888",bg:"#eee",t:"#333"};
    const wblock=kg>0&&m.w?`<div class="wdose">⚖️ Para ${kg}kg${m.w.map(r=>{const lo=+(r.min*kg).toFixed(1);const hi=+(r.max*kg).toFixed(1);return`<br><span class="wdl">${r.l}:</span> ${lo===hi?lo:lo+"–"+hi} ${r.u}`;}).join("")}</div>`:"";
    const sols=SOL[m.n]||["SF","SG5"];
    const solHtml=sols.map(d=>d==="direto"?`<span class="sol sol-d">direto</span>`:d==="SF"?`<span class="sol sol-sf">SF ✓</span>`:`<span class="sol sol-sg">SG5% ✓</span>`).join("");
    const isFav=_favs.has(m.n);
    const pump=PUMP[m.n];
    const pumpBlock=pump?`<div class="pump"><span class="pump-lbl">⚙️ Bomba</span><span class="pump-dil">${pump.dil}</span><div class="pump-row">Dose <input type="number" class="pump-inp" value="${_pumpDoses[m.n]??pump.def}" min="${pump.min}" max="${pump.max}" step="${pump.step}" oninput="calcPump(this,${i})"> <span class="pump-unit">${pump.unit}</span> → <b class="pump-res">${_pumpCalc(pump,_pumpDoses[m.n]??pump.def,kg)}</b></div></div>`:"";
    return`<div class="card" style="--cc:${cat.c};--cbg:${cat.bg};--ct:${cat.t}">
<div class="ch"><span class="dn">${m.n}</span><div style="display:flex;gap:4px;align-items:center"><span class="cb">${m.cat}</span><span class="fav${isFav?" on":""}" onclick="toggleFav(${i},this)">${isFav?"⭐":"☆"}</span><span class="cp" data-i="${i}" onclick="cp(${i})">📋</span></div></div>
<div class="row"><span class="lbl">Ampola</span><span class="val">${m.amp}</span></div>
<div class="row"><span class="lbl">Dose adulto</span><span class="val">${m.dose}</span></div>
<div class="row"><span class="lbl">Diluição</span><span class="val">${m.dil}</span></div>
<div class="row"><span class="lbl">Indicação</span><span class="val">${m.ind}</span></div>
<div class="row"><span class="lbl">Diluentes</span><span class="val">${solHtml}</span></div>
<div class="mac">${m.mac}</div>${wblock}${pumpBlock}
</div>`;
  }).join("");
}

function cp(i){
  const m=_shown[i];
  const kg=parseFloat(document.getElementById("wt").value)||0;
  let txt=`${m.n.toUpperCase()}\nDose: ${m.dose}\nDiluição: ${m.dil}`;
  if(kg>0&&m.w){txt+=`\n⚖️ Para ${kg}kg:\n`+m.w.map(r=>{const lo=+(r.min*kg).toFixed(1);const hi=+(r.max*kg).toFixed(1);return`  ${r.l}: ${lo===hi?lo:lo+"–"+hi} ${r.u}`;}).join("\n");}
  navigator.clipboard.writeText(txt).catch(()=>{});
  const el=document.querySelector(`.cp[data-i="${i}"]`);
  if(el){el.textContent="✓";setTimeout(()=>el.textContent="📋",2000);}
}

function _pItem(item){
  if(item.ou)return'<div class="pou">— ou —</div>';
  var obs=item.obs?'<div class="pitem-obs">'+item.obs+'</div>':'';
  return'<div class="pitem"><div class="pitem-top"><span class="pitem-drug">'+item.n+'</span><span class="pitem-dose"> '+item.dose+'</span></div>'+obs+'</div>';
}
function _pFase(f){
  var tempo=f.tempo?'<span class="pfase-tempo">'+f.tempo+'</span>':'';
  return'<div class="pfase"><div class="pfase-hd">'+f.fase+tempo+'</div>'+f.itens.map(_pItem).join('')+'</div>';
}
function showProto(){
  document.getElementById("protocols").innerHTML=PROTO.map(function(p){
    return'<div class="pcard" style="border-left-color:'+p.cor+'"><div class="pcard-title">'+p.title+'</div>'+p.passos.map(_pFase).join('')+'</div>';
  }).join('');
}

function setTab(tab){
  const isMed=tab==="meds";
  document.getElementById("bar").style.display=isMed?"":"none";
  document.getElementById("grid").style.display=isMed?"":"none";
  document.getElementById("protocols").style.display=isMed?"none":"block";
  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("on",t.dataset.tab===tab));
  if(!isMed)showProto();
}

function toggleTheme(){
  const dark=document.documentElement.dataset.theme==='dark';
  document.documentElement.dataset.theme=dark?'':'dark';
  document.getElementById('themeBtn').textContent=dark?'🌙':'☀️';
  localStorage.setItem('guia-theme',dark?'light':'dark');
}
(function(){
  const t=localStorage.getItem('guia-theme');
  if(t==='dark'){document.documentElement.dataset.theme='dark';document.getElementById('themeBtn').textContent='☀️';}
})();

if('serviceWorker' in navigator && location.protocol !== 'file:'){
  navigator.serviceWorker.register('./sw.js').catch(()=>{});
}

mkFilt();show(M);
</script>
</body>
</html>
