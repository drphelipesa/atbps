const allCats=["Todos",...Object.keys(C)];
let active="Todos";

function mkFilt(){
  const el=document.getElementById("filters");
  el.innerHTML=allCats.map(c=>`<button class="filt${c===active?" on":""}" data-c="${c}">${c}</button>`).join("");
  el.querySelectorAll(".filt").forEach(b=>b.addEventListener("click",()=>{active=b.dataset.c;mkFilt();show(filt())}));
}

function filt(){
  const q=document.getElementById("search").value.toLowerCase().trim();
  return M.filter(m=>{
    const mc=active==="Todos"||m.cat===active;
    if(!q)return mc;
    return mc&&(m.n+m.cat+m.dose+m.ind+m.mac+m.dil+m.amp).toLowerCase().includes(q);
  });
}

function show(list){
  const g=document.getElementById("grid");
  document.getElementById("count").textContent=list.length+" medicamento"+(list.length!==1?"s":"")+" encontrado"+(list.length!==1?"s":"");
  if(!list.length){g.innerHTML='<div class="nores">Nenhum resultado encontrado.</div>';return;}
  g.innerHTML=list.map(m=>{
    const s=C[m.cat]||{c:"#888",bg:"#eee",t:"#333"};
    return`<div class="card" style="--cc:${s.c};--cbg:${s.bg};--ct:${s.t}">
<div class="ch"><span class="dn">${m.n}</span><span class="cb">${m.cat}</span></div>
<div class="row"><span class="lbl">Ampola</span><span class="val">${m.amp}</span></div>
<div class="row"><span class="lbl">Dose adulto</span><span class="val">${m.dose}</span></div>
<div class="row"><span class="lbl">Diluição</span><span class="val">${m.dil}</span></div>
<div class="row"><span class="lbl">Indicação</span><span class="val">${m.ind}</span></div>
<div class="mac">${m.mac}</div>
</div>`;
  }).join("");
}

document.getElementById("search").addEventListener("input",()=>show(filt()));
mkFilt();show(M);
</script>
